<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <title>{% block  title %}用户登录{% endblock %}</title>
    <meta content="" name="description">
    <meta content="" name="keywords">

    <link href="/static/img/logo.jpg" rel="icon">
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
    <link href="/static/vendor/quill/quill.snow.css" rel="stylesheet">
    <link href="/static/vendor/quill/quill.bubble.css" rel="stylesheet">
    <link href="/static/vendor/remixicon/remixicon.css" rel="stylesheet">
    <link href="/static/vendor/simple-datatables/style.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">

</head>

<body>
{% load static %}
<main style="background-image: url({% static 'background/b2.jpg' %});background-repeat: no-repeat;background-size: cover">
    <div class="container">

        <section class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">

                        <div class="d-flex justify-content-center py-4">
                            <a href="{% url 'login' %}" class="logo d-flex align-items-center w-auto">
                                <img src="/static/img/logo.jpg" alt="">
                                <span class="d-none d-lg-block" style="color: black">旅游景点推荐系统</span>
                            </a>
                        </div>

                        <div class="card mb-3">
                            {% block  content %}
                                <div class="card-body" style="width: 420px">
                                    <ul class="nav nav-tabs nav-tabs-bordered d-flex" id="borderedTabJustified" role="tablist" style="margin: 30px">
                                        <li class="nav-item flex-fill" role="presentation">
                                            <button class="nav-link w-100 user-login-btn active" role="tab">用户登录</button>
                                        </li>
                                        <li class="nav-item flex-fill" role="presentation">
                                            <button class="nav-link w-100 admin-login-btn" role="tab">管理员登录</button>
                                        </li>
                                    </ul>
                                    <form method="POST" action="{% url 'login' %}" class="row g-3 needs-validation" novalidate>
                                        <div class="col-12">
                                            <label for="yourUsername" class="form-label">用户名</label>
                                            <div class="input-group has-validation">
                                                <input type="text" name="username" class="form-control" id="username" required>
                                                <div class="invalid-feedback">请输入您的用户名!</div>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <label for="yourPassword" class="form-label">密码</label>
                                            <input type="password" name="password" class="form-control" id="password" required>
                                            <div class="invalid-feedback">请输入您的密码!</div>
                                        </div>

                                        <div class="col-12" id="submitDiv">
                                            <button class="btn btn-primary w-100" type="submit">提交</button>
                                        </div>
                                        <div class="col-12">
                                            <p class="small mb-0">还没有账号? <a href="{% url 'register' %}">创建账号</a></p>
                                        </div>
                                    </form>
                                </div>
                            {% endblock %}
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
<a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
<script src="/static/vendor/apexcharts/apexcharts.min.js"></script>
<script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/vendor/chart.js/chart.min.js"></script>
<script src="/static/vendor/echarts/echarts.min.js"></script>
<script src="/static/vendor/quill/quill.min.js"></script>
<script src="/static/vendor/simple-datatables/simple-datatables.js"></script>
<script src="/static/vendor/tinymce/tinymce.min.js"></script>
<script src="/static/vendor/php-email-form/validate.js"></script>
<script src="/static/js/main.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var userLoginBtn = document.querySelector('.user-login-btn');
        var adminLoginBtn = document.querySelector('.admin-login-btn');

        userLoginBtn.addEventListener('click', function() {
            window.location.href = "{% url 'login' %}";
        });

        adminLoginBtn.addEventListener('click', function() {
            {#window.location.href = "{% url 'adminLogin' %}";#}
            window.location.href = "/app/adminLogin/";
        });
    });
</script>
{% block AjaxScript %}
    <script>
        $(document).ready(function() {
            $('form').on('submit', function(event) {
                event.preventDefault();

                var username = $('#username').val();
                var password = $('#password').val();
                if (username === '' || password === '') {  // 未填写则不发送ajax请求
                    return;
                }
                $.ajax({
                    type: 'POST',
                    url: '{% url "login" %}',
                    data: {
                        'username': username,
                        'password': password
                    },
                    success: function(response) {
                        if (response.error) {
                            showErrorAlert(response.error);
                        } else {
                            // 响应成功，跳转到首页
                            window.location.href = '{% url 'home' %}';
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error("An error occurred: " + status + "\nError: " + error);
                    }
                });
            });

            function showErrorAlert(message) {
                $('.alert.alert-danger').remove();
                // 创建提示框，并显示错误信息
                var alertHtml = `
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-octagon me-1"></i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
                $('#submitDiv').before(alertHtml);
            }
        });
    </script>
{% endblock %}

</body>
</html>
