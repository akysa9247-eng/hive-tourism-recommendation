{% extends 'admin_base.html' %}

{% block title %}
    新增景点
{% endblock %}

{% block container %}
    <div class="pagetitle" style="display: flex; align-items: center">
        <div style="margin-right: auto">
            <h1>新增景点</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">管理员系统 </a></li>
                    <li class="breadcrumb-item">景点信息管理 </li>
                    <li class="breadcrumb-item active">新增景点</li>
                </ol>
            </nav>
        </div>
    </div>

    <section class="section dashboard">
        <div class="row">

            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">新增景点</h5>
                        <div class="activity">
                            <form class="row g-3 needs-validation" action="{% url 'adminAddSight' %}" method="POST" enctype="multipart/form-data" novalidate="">
                                <div class="col-12">
                                    <label for="inputText" class="form-label">景点名称</label>
                                    <input type="text" class="form-control" id="sight_name" name="sight_name" required>
                                    <div class="invalid-feedback">请输入景点名称!</div>
                                </div>
                                <div class="col-md-2" style="width: 200px">
                                    <select class="form-select" name="province" id="province" required>
                                        <option selected="" value="{{ province }}">选择省份</option>
                                        {% for province in provinces %}
                                            <option value="{{ province }}">{{ province }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="col-md-2" style="width: 200px">
                                    <select class="form-select" name="city" id="city" disabled required>
                                        <option selected="" disabled value="{{ city }}">选择城市</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">地址</label>
                                    <input type="text" id="address" name="address" class="form-control">
                                </div>

                                <div class="col-md-2" style="width: 200px">
                                    <label for="inputText" class="form-label">等级</label>
                                    <select class="form-select" id="level" name="level">
                                        <option selected="" value="未评级">未评级</option>
                                        <option value="5A">5A</option>
                                        <option value="4A">4A</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">评分</label>
                                    <input type="number" class="form-control" id="score" name="score" required>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">热度</label>
                                    <input type="number" class="form-control" id="heat_score" name="heat_score" required>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">标签列表</label>
                                    <input type="text" class="form-control" id="tag_list" name="tag_list">
                                </div>

                                <div class="col-12">
                                    <label for="inputText" class="form-label">官方电话</label>
                                    <input type="text" class="form-control" id="telephone" name="telephone">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">介绍</label>
                                    <textarea name="intro" class="form-control"  style="height: 100px"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">开放时间</label>
                                    <input type="text" class="form-control" id="opening_time" name="opening_time">
                                </div>

                                <div class="col-12">
                                    <label for="inputText" class="form-label">封面</label>
                                    <br>
                                    <input class="form-control" id="cover" type="file" name="cover">
                                </div>
                                <div class="col-12" style="margin-bottom: 20px">
                                    <label for="inputText" class="form-label">图片</label>
                                    <br>
                                    <input class="form-control" id="img_list" type="file" name="img_list" multiple>
                                </div>

                                <div class="text-center" id="submitDiv">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <a href="{% url 'adminAddSight' %}" class="btn btn-success">刷新</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block ajaxRequest %}
    <script>
        $(document).ready(function() {
            $('#province').change(function() {
                var selectedProvince = $(this).val();
                if (selectedProvince) {
                    // 启用城市下拉框
                    $('#city').prop('disabled', false);
                    // 清空城市下拉框的选项
                    $('#city').empty();
                    // 添加一个默认的“选择城市”选项
                    $('#city').append($('<option></option>').attr('value', '').text('选择城市'));

                    $.ajax({
                        url: '/app/getCitiesByProvince', // 请求路径
                        type: 'GET', //请求方式
                        data: {
                            'province': selectedProvince
                        },
                        success: function(data) {
                            $.each(data, function(index, city) {
                                $('#city').append($('<option></option>').attr('value', city).text(city));
                            });
                        },
                        error: function(jqXHR, textStatus, errorThrown) {
                            console.log('Error fetching cities: ' + textStatus);
                        }
                    });
                } else {
                    // 如果没有选择省份，则禁用城市下拉框
                    $('#city').prop('disabled', true);
                    // 清空城市下拉框的选项
                    $('#city').empty();
                    $('#city').append($('<option></option>').attr('value', '').text('选择城市'));
                }
            });
        });
    </script>
    <script>
        $(document).ready(function() {
            $('form').on('submit', function(event) {
                event.preventDefault(); // 阻止表单默认提交行为

                // 创建FormData对象 上传文件
                var formData = new FormData(this);

                $.ajax({
                    type: 'POST',
                    url: '/app/adminAddSight/',
                    data: formData,
                    contentType: false,
                    processData: false,
                    cache: false,
                    success: function(response) {
                        if (response.error) {
                            showErrorAlert(response.error);
                        } else {
                            window.location.href = '{% url 'adminSightInfoList' %}';
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error("An error occurred: " + status + "\nError: " + error);
                    }
                });
            });

            function showErrorAlert(message) {
                $('#alert-danger').remove();

                // 创建提示框并显示错误信息
                var alertHtml = `
                <div class="row mb-3" id="alert-danger">
                    <div class="alert alert-danger alert-dismissible fade show form-control" role="alert">
                        <i class="bi bi-exclamation-octagon me-1"></i>
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                </div>
            `;
                $('#submitDiv').before(alertHtml);
            }
        });
    </script>
{% endblock %}
