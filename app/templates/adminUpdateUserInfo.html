{% extends 'admin_base.html' %}

{% block title %}
    修改用户信息
{% endblock %}

{% block container %}
    <div class="pagetitle" style="display: flex; align-items: center">
        <div style="margin-right: auto">
            <h1>修改用户信息</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">管理员系统</a></li>
                    <li class="breadcrumb-item">用户信息管理</li>
                    <li class="breadcrumb-item"><a href="{% url 'adminUserInfoList' %}">用户信息列表</a></li>
                    <li class="breadcrumb-item"><a class="active" href="{% url 'adminUpdateUserInfo' userInfo.username %}">修改用户信息</a></li>
                </ol>
            </nav>
        </div>
    </div>

    <section class="section dashboard">
        <div class="row">

            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">修改用户信息</h5>
                        <div class="activity">
                            <form class="row g-3" action="{% url 'adminUpdateUserInfo' userInfo.username %}" method="POST" enctype="multipart/form-data">
                                <div class="col-12">
                                    <label for="inputText" class="form-label">用户名</label>
                                    <input type="text" class="form-control" name="username" value="{{ userInfo.username }}" disabled>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">性别</label>
                                    <select class="form-select" name="sex" aria-label="Default select example">
                                        <option {% if userInfo.sex == "男" %}
                                            selected
                                        {% endif %} value="男">男</option>
                                        <option {% if userInfo.sex == "女" %}
                                            selected
                                        {% endif %} value="女">女</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">地址</label>
                                    <input type="text" name="address" placeholder="{{ userInfo.address }}" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">联系方式</label>
                                    <input type="text" name="contact_info" placeholder="{{ userInfo.contact_info }}" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">个人简介</label>
                                    <textarea name="intro" class="form-control" placeholder="{{ userInfo.intro }}" style="height: 100px"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">最近登录时间</label>
                                    <input type="text" class="form-control" name="username" value="{{ userInfo.last_login_time | date:"Y-m-d H:i:s"  }}" disabled>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">注册时间</label>
                                    <input type="text" class="form-control" name="username" value="{{ userInfo.create_time | date:"Y-m-d H:i:s"  }}" disabled>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">头像</label>
                                    <br>
                                    <img style="width:100px;border:1px solid #ddd;padding:5px" src="/media/{{ userInfo.avatar }}" alt="">
                                    <input class="form-control" type="file" name="avatar">
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <button type="reset" class="btn btn-success">重置</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
