{% extends 'admin_base.html' %}

{% block title %}
    新增用户
{% endblock %}

{% block container %}
    <div class="pagetitle" style="display: flex; align-items: center">
        <div style="margin-right: auto">
            <h1>新增用户</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">管理员系统 </a></li>
                    <li class="breadcrumb-item">用户信息管理 </li>
                    <li class="breadcrumb-item active">新增用户</li>
                </ol>
            </nav>
        </div>
    </div>

    <section class="section dashboard">
        <div class="row">

            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">新增用户</h5>
                        <div class="activity">
                            <form class="row g-3 needs-validation" action="{% url 'adminAddUser' %}" method="POST" enctype="multipart/form-data" novalidate="">
                                <div class="col-12">
                                    <label for="inputText" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                    <div class="invalid-feedback">请输入用户名!</div>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">密码</label>
                                    <input type="text" class="form-control" id="password" name="password" required>
                                    <div class="invalid-feedback">请输入新密码!</div>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">确认密码</label>
                                    <input type="text" class="form-control" id="confirm_password" name="confirm_password" required>
                                    <div id="confirmPasswordFeedback" class="invalid-feedback">请输入确认密码!</div>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">性别</label>
                                    <select class="form-select" id="sex" name="sex" aria-label="Default select example">
                                        <option value="男">男</option>
                                        <option value="女">女</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">地址</label>
                                    <input type="text" id="address" name="address" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">联系方式</label>
                                    <input type="text" id="contact_info" name="contact_info" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">个人简介</label>
                                    <textarea name="intro" id="intro" class="form-control" style="height: 100px"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">头像</label>
                                    <br>
                                    <img style="width:100px;border:1px solid #ddd;padding:5px" src="/media/avatar/default.jpg" alt="">
                                    <input class="form-control" id="avatar" type="file" name="avatar">
                                </div>
                                <div class="text-center" id="submitDiv">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <a href="{% url 'adminAddUser' %}" class="btn btn-success">刷新</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block ajaxRequest %}
    <script>
        $(document).ready(function() {
            $('form').on('submit', function(event) {
                event.preventDefault(); // 阻止表单默认提交行为

                // 从表单元素中获取数据
                var username = $('#username').val();
                var password = $('#password').val();
                var confirmPassword = $('#confirm_password').val();
                var sex = $('#sex').val();
                var address = $('#address').val();
                var contact_info = $('#contact_info').val();
                var intro = $('#intro').val();

                if (username === '' || password === '' || confirmPassword === '') {
                    // 未填写则不发送请求
                    return;
                }

                var formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                formData.append('confirm_password', confirmPassword);
                formData.append('sex', sex);
                formData.append('address', address);
                formData.append('contact_info', contact_info);
                formData.append('intro', intro);

                var avatarFile = $('#avatar')[0].files[0];
                if (avatarFile) {
                    formData.append('avatar', avatarFile);
                }

                $.ajax({
                    type: 'POST',
                    url: '/app/adminAddUser/',
                    data: formData,
                    contentType: false,
                    processData: false,
                    success: function(response) {
                        if (response.error) {
                            showErrorAlert(response.error);
                        } else {
                            window.location.href = '{% url 'adminUserInfoList' %}';
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error("An error occurred: " + status + "\nError: " + error);
                    }
                });
            });
            function showErrorAlert(message) {
                $('#alert-danger').remove();
                // 创建提示框并显示错误信息
                var alertHtml = `
                    <div class="row mb-3" id="alert-danger">
                        <div class="alert alert-danger alert-dismissible fade show form-control" role="alert">
                            <i class="bi bi-exclamation-octagon me-1"></i>
                            ${message}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    </div>
                `;
                $('#submitDiv').before(alertHtml);
            }
        });
    </script>
{% endblock %}
