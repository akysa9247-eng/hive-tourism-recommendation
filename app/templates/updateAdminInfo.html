{% extends 'admin_base.html' %}

{% block title %}
    修改管理员信息
{% endblock %}

{% block container %}
    <div class="pagetitle" style="display: flex; align-items: center">
        <div style="margin-right: auto">
            <h1>管理员信息</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">管理员系统 </a></li>
                    <li class="breadcrumb-item active">管理员信息</li>
                </ol>
            </nav>
        </div>
    </div>

    <section class="section dashboard">
        <div class="row">

            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">修改管理员信息</h5>
                        <div class="activity">
                            <form class="row g-3" action="{% url 'updateAdminInfo' %}" method="POST" enctype="multipart/form-data">
                                <div class="col-12">
                                    <label for="inputText" class="form-label">用户名</label>
                                    <input type="text" class="form-control" name="adminname" value="{{ adminInfo.adminname }}" disabled>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">性别</label>
                                    <select class="form-select" name="sex" aria-label="Default select example">
                                        <option {% if adminInfo.sex == "男" %}
                                            selected
                                        {% endif %} value="男">男</option>
                                        <option {% if adminInfo.sex == "女" %}
                                            selected
                                        {% endif %} value="女">女</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">地址</label>
                                    <input type="text" name="address" placeholder="{{ adminInfo.address }}" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">联系方式</label>
                                    <input type="text" name="contact_info" placeholder="{{ adminInfo.contact_info }}" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">个人简介</label>
                                    <textarea name="intro" class="form-control" placeholder="{{ adminInfo.intro }}" style="height: 100px"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">最近登录时间</label>
                                    <input type="text" class="form-control" name="last_login_time" value="{{ adminInfo.last_login_time | date:"Y-m-d H:i:s"  }}" disabled>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">注册时间</label>
                                    <input type="text" class="form-control" name="create_time" value="{{ adminInfo.create_time | date:"Y-m-d H:i:s"  }}" disabled>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="form-label">头像</label>
                                    <br>
                                    <img style="width:100px;border:1px solid #ddd;padding:5px" src="/media/{{ adminInfo.avatar }}" alt="">
                                    <input class="form-control" type="file" name="avatar">
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <button type="reset" class="btn btn-secondary">重置</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>
{% endblock %}


{% block echarts %}
    <script>

    </script>
{% endblock %}
