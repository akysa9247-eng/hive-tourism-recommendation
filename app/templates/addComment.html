{% extends 'base.html' %}

{% block title %}
    添加评论
{% endblock %}

{% block container %}
    <div class="pagetitle" style="display: flex; align-items: center">
        <div style="margin-right: auto">
            <h1>添加评论</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">主页 </a></li>
                    <li class="breadcrumb-item"><a href="{% url 'sightDataList' %}">景点列表 </a></li>
                    <li class="breadcrumb-item active">添加评论</li>
                </ol>
            </nav>
        </div>
    </div>

    <section class="section dashboard">
        <div class="row">

            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">添加评论数据</h5>
                        <div class="activity">
                            <form action="{% url 'addComment' sight_id %}" method="POST">
                                <!--景点名称-->
                                <div class="col-12">
                                    <label for="inputText" class="col-sm-2 col-form-label" style="font-size: 18px">景点</label>
                                    <div class="col-sm-10">
                                        <input type="text" name="username" disabled value="{{ sight_info.sight_name }}" class="form-control">
                                    </div>
                                </div>

                                <!--地址-->
                                <div class="col-12">
                                    <label for="inputText" class="col-sm-2 col-form-label" style="font-size: 18px">地址</label>
                                    <div class="col-sm-10">
                                        <input type="text" name="address" disabled value="{{ sight_info.address }}" class="form-control">
                                    </div>
                                </div>

                                <!--封面-->
                                <div class="col-12">
                                    <label for="inputText" class="col-sm-2 col-form-label" style="font-size: 18px">封面</label>
                                    <div class="col-sm-10">
                                        <img style="width: 300px;border: 1px solid #ddd;padding: 5px" src="{{ sight_info.cover }}" alt="">
                                    </div>
                                </div>

                                <!--评分-->
                                <script>
                                    let currentScore = 0
                                    function rateStar(score){
                                        currentScore = score
                                        document.getElementById('score').value = score
                                        const stars = document.querySelectorAll(".star")
                                        stars.forEach((item, index)=>{
                                            if(index<score){
                                                item.classList.add('checked')
                                            }else{
                                                item.classList.remove('checked')
                                            }
                                        })
                                    }
                                </script>
                                <div class="col-12">
                                    <label for="inputText" class="col-sm-2 col-form-label" style="font-size: 18px">评分</label>
                                    <div class="col-sm-10 star-container">
                                        <div class="star" onclick="rateStar(1)">★</div>
                                        <div class="star" onclick="rateStar(2)">★</div>
                                        <div class="star" onclick="rateStar(3)">★</div>
                                        <div class="star" onclick="rateStar(4)">★</div>
                                        <div class="star" onclick="rateStar(5)">★</div>
                                        <input type="text" name="score" id="score" style="display: none">
                                    </div>
                                </div>

                                <!--评论内容-->
                                <div class="col-12">
                                    <label for="inputText" class="col-sm-2 col-form-label" style="font-size: 18px">评论内容</label>
                                    <div class="col-sm-10">
                                        <textarea name="content" class="form-control" placeholder="请输入评论" style="height: 100px"></textarea>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="inputText" class="col-sm-2 col-form-label"></label>
                                    <div class="col-sm-10">
                                        <button type="submit" class="btn btn-primary">提交</button>
                                        <a href="{% url 'addComment' sight_info.sight_id %}" class="btn btn-success">刷新</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>
{% endblock %}

{% block echarts %}
    <script>

    </script>
{% endblock %}
