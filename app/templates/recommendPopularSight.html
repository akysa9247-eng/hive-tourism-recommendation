{% extends 'base.html' %}

{% block title %}
    热门景点推荐
{% endblock %}

{% block container %}
    <div class="pagetitle" style="display: flex; align-items: center">
        <div style="margin-right: auto">
            <h1>热门景点推荐</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">主页 </a></li>
                    <li class="breadcrumb-item">景点推荐</li>
                    <li class="breadcrumb-item active">热门景点推荐</li>
                </ol>
            </nav>
        </div>
    </div>

    <form id="Form-main" class="row g-3" style="margin-bottom: 10px" method="GET" action="{% url 'getRecommendPopularSight' %}">
        <div class="col-md-2" style="width: 150px; margin-bottom: 10px">
            <select class="form-select" name="province" id="province">
                <option selected="" value="{{ province }}">选择省份</option>
                {% for province in provinces %}
                    <option value="{{ province }}">{{ province }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2" style="width: 150px; margin-bottom: 10px">
            <select class="form-select" name="city" id="city" disabled>
                <option selected="" value="{{ province }}">选择城市</option>
            </select>
        </div>
        <div class="col-md-2" style="width: 150px; margin-bottom: 10px">
            <button id="submitBtn" type="submit" class="btn btn-default btn-outline-primary" >提交</button>
        </div>
    </form>

    <section class="section dashboard">
        <div class="row" id="boardRow" style="min-height: 1500px;height: auto;overflow: auto;">
        </div>
    </section>
{% endblock %}

{% block echarts %}
    <script>
        $(document).ready(function() {
            $('#province').change(function() {
                var selectedProvince = $(this).val();
                if (selectedProvince) {
                    // 启用城市下拉框
                    $('#city').prop('disabled', false);
                    // 清空城市下拉框的选项
                    $('#city').empty();
                    // 添加一个默认的“选择城市”选项
                    $('#city').append($('<option></option>').attr('value', '').text('选择城市'));

                    $.ajax({
                        url: '{% url 'getCitiesByProvince' %}',
                        type: 'GET',
                        data: {
                            'province': selectedProvince
                        },
                        success: function(data) {
                            $.each(data, function(index, city) {
                                $('#city').append($('<option></option>').attr('value', city).text(city));
                            });
                        },
                        error: function(jqXHR, textStatus, errorThrown) {
                            console.log('Error fetching cities: ' + textStatus);
                        }
                    });
                } else {
                    // 如果没有选择省份，则禁用城市下拉框
                    $('#city').prop('disabled', true);
                    // 清空城市下拉框的选项
                    $('#city').empty();
                    // 添加一个默认的“选择城市”选项
                    $('#city').append($('<option></option>').attr('value', '').text('选择城市'));
                }
            });
        });
    </script>
    <script>
        $(document).ready(function() {
            $('#Form-main').submit(function(event) {
                event.preventDefault();

                var province = $('#province').val();
                var city = $('#city').val();

                // 发送 AJAX 请求
                $.ajax({
                    url: '{% url "getRecommendPopularSight" %}',
                    type: 'GET',
                    data: {
                        province: province,
                        city: city
                    },
                    success: function(data) {
                        var boardRow = $('#boardRow');
                        boardRow.empty();
                        // 遍历返回的景点数据，并为每个景点创建卡片
                        $.each(data, function(index, sight) {
                            var cardBodyHTML = `
                                <div class="col-xxl-4 col-md-5">
                                    <div class="card">
                                        <div class="card-body" style="height: 550px">
                                            <a href="/app/sightDetailInfo/${sight.sight_id}" target="_blank">
                                                <h5 class="card-title">${sight.sight_name} <span>| ${sight.city}</span></h5>
                                            </a>
                                            <a href="/app/sightDetailInfo/${sight.sight_id}" target="_blank">
                                                <img src="${sight.cover}" width="360px" height="222px">
                                            </a>
                                            <div class="col-lg-9 col-md-8" style="margin-top: 7px;font-size: 18px">评分: <span class="badge bg-primary" style="font-size: 15px;">${sight.score}分</span></div>
                                            <div class="col-lg-9 col-md-8" style="margin-top: 7px;font-size: 18px">热度: <span class="badge bg-danger" style="font-size: 15px;">${sight.heat_score}</span></div>
                                            <div class="col-lg-9 col-md-8" style="margin-top: 7px;font-size: 18px">等级: <span>${sight.level}</span></div>
                                            <div class="col-lg-9 col-md-8" style="margin-top: 7px;font-size: 18px">标签: <span>${sight.tag_list}</span></div>
                                            <div class="col-lg-9 col-md-8" style="margin-top: 7px;font-size: 18px;width: 100%">地址: <span>${sight.address}</span></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            boardRow.append(cardBodyHTML);
                        });
                    },
                    error: function(jqXHR, textStatus, errorThrown) {
                        console.error('AJAX 请求失败:', textStatus, errorThrown);
                    }
                });
            });
        });
    </script>
{% endblock %}
